name: verify-langchain-openwiki-solar-open2

on:
  push:
    branches: [main]
    paths:
      - "04-langchain-openwiki-solar-open2/**"
      - ".github/workflows/verify-langchain-openwiki-solar-open2.yml"
  pull_request:
    paths:
      - "04-langchain-openwiki-solar-open2/**"
      - ".github/workflows/verify-langchain-openwiki-solar-open2.yml"
  workflow_dispatch: {}
  workflow_call:
    inputs:
      model:
        type: string
        required: false
        default: solar-open2

# All 7 verify-*.yml workflows in this repo share this same group, so
# only one can ever run against the shared Upstage account at a time —
# a second trigger queues instead of colliding for the same rate-limit
# budget (confirmed live: a push touching multiple case files fired 5
# individual workflows at once on top of an already-running
# verify-all-sequential.yml). Reusable-workflow calls (verify-all*.yml's
# `uses:` of this file) don't re-acquire this group — only this file's
# own direct triggers do — so there's no self-deadlock risk.
concurrency:
  group: verify-upstage-solar-open2
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Why a fork instead of `npm install -g openwiki`: Solar Open2 has a
      # real, confirmed bug (Upstage-side, not openwiki's or deepagents')
      # where it drops the tool_call function name specifically in
      # *streamed* responses — verified directly via a local logging
      # proxy comparing stream:false vs stream:true. openwiki's public npm
      # release always streams, so it can't reach Solar Open2 correctly.
      # The jyje/openwiki fork below adds an opt-in
      # OPENWIKI_DISABLE_STREAMING env var that works around it; that fix
      # hasn't landed upstream yet. See README.md's Finding 2 for the
      # full writeup.
      - name: Check out patched openwiki fork
        uses: actions/checkout@v4
        with:
          repository: jyje/openwiki
          ref: fix/disable-streaming-for-tool-calling-providers
          path: openwiki-fork

      - name: Build and link patched openwiki
        working-directory: openwiki-fork
        run: |
          npm install -g pnpm
          pnpm install --frozen-lockfile
          pnpm run build
          npm link

      - name: Run verification
        env:
          UPSTAGE_API_KEY: ${{ secrets.UPSTAGE_API_KEY }}
          SOLAR_MODEL: ${{ inputs.model }}
        run: ./04-langchain-openwiki-solar-open2/scripts/verify.sh
