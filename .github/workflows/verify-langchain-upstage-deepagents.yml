name: verify-langchain-upstage-deepagents

on:
  push:
    branches: [main]
    paths:
      - "03-langchain-upstage-deepagents/**"
      - ".github/workflows/verify-langchain-upstage-deepagents.yml"
  pull_request:
    paths:
      - "03-langchain-upstage-deepagents/**"
      - ".github/workflows/verify-langchain-upstage-deepagents.yml"
  workflow_dispatch: {}
  workflow_call:
    inputs:
      model:
        type: string
        required: false
        default: solar-open2

# All 7 verify-*.yml workflows in this repo share this same group, so
# only one can ever run against the shared Upstage account at a time —
# a second trigger queues instead of colliding for the same rate-limit
# budget (confirmed live: a push touching multiple case files fired 5
# individual workflows at once on top of an already-running
# verify-all-sequential.yml). Reusable-workflow calls (verify-all*.yml's
# `uses:` of this file) don't re-acquire this group — only this file's
# own direct triggers do — so there's no self-deadlock risk.
concurrency:
  group: verify-upstage-solar-open2
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Lint, type-check, and test (python-lint)
        working-directory: 03-langchain-upstage-deepagents/src
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run ty check .
          uv run pytest -q

      - name: Run verification
        env:
          UPSTAGE_API_KEY: ${{ secrets.UPSTAGE_API_KEY }}
          SOLAR_MODEL: ${{ inputs.model }}
        run: ./03-langchain-upstage-deepagents/scripts/verify.sh
