name: verify-claude-agent-sdk-local

on:
  push:
    branches: [main]
    paths:
      - "02-claude-agent-sdk-local/**"
      - ".github/workflows/verify-claude-agent-sdk-local.yml"
  pull_request:
    paths:
      - "02-claude-agent-sdk-local/**"
      - ".github/workflows/verify-claude-agent-sdk-local.yml"
  workflow_dispatch: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - uses: astral-sh/setup-uv@v5
        with:
          working-directory: 02-claude-agent-sdk-local/src

      - name: Lint, type-check, and test (python-lint)
        working-directory: 02-claude-agent-sdk-local/src
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run ty check .
          uv run pytest -q

      - name: Run verification
        env:
          UPSTAGE_API_KEY: ${{ secrets.UPSTAGE_API_KEY }}
        run: ./02-claude-agent-sdk-local/scripts/verify.sh
