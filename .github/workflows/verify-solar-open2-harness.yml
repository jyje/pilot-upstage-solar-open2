name: verify-solar-open2-harness

on:
  push:
    branches: [main]
    paths:
      - "01-solar-open2-harness/**"
      - ".github/workflows/verify-solar-open2-harness.yml"
  pull_request:
    paths:
      - "01-solar-open2-harness/**"
      - ".github/workflows/verify-solar-open2-harness.yml"
  workflow_dispatch: {}
  workflow_call:
    inputs:
      model:
        type: string
        required: false
        default: solar-open2

# All 7 verify-*.yml workflows in this repo share this same group, so
# only one can ever run against the shared Upstage account at a time —
# a second trigger queues instead of colliding for the same rate-limit
# budget (confirmed live: a push touching multiple case files fired 5
# individual workflows at once on top of an already-running
# verify-all-sequential.yml). Reusable-workflow calls (verify-all*.yml's
# `uses:` of this file) don't re-acquire this group — only this file's
# own direct triggers do — so there's no self-deadlock risk.
concurrency:
  group: verify-upstage-solar-open2
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install claude-upstage
        run: curl -fsSL https://console.upstage.ai/claude-upstage.sh | sh -s install

      - name: Run verification
        env:
          UPSTAGE_API_KEY: ${{ secrets.UPSTAGE_API_KEY }}
          SOLAR_MODEL: ${{ inputs.model }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          ./01-solar-open2-harness/scripts/verify.sh
