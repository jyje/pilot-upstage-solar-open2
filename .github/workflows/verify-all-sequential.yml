name: verify-all-sequential

# The single verification workflow for this repo. Runs all 5 cases
# against solar-open2, one at a time as one of 5 steps — each step is
# scripts/verify-case.sh (shared with local ad-hoc runs), which waits
# until Upstage's rate-limit budget for the model is *fully* reset (see
# scripts/wait-for-upstage-full-reset.sh, 10-minute cap) before that
# case starts, rather than a fixed guessed delay or a "headroom looks
# thin" threshold — a case starting with partial leftover headroom from
# the case before it was seen to starve partway through even though
# that headroom looked "enough" at the time. continue-on-error: true per
# step so one failing case doesn't hide the rest — the final Recap step
# reports the real pass/fail of every step regardless. Manual-only
# (workflow_dispatch).
#
# solar-open2 only, by design: this repo's purpose is demonstrating
# every use case on Solar Open2, not benchmarking Upstage's model
# lineup. An earlier version of this workflow also ran solar-pro3 for
# comparison, which surfaced a real, root-caused Tier-0 capacity limit
# for Case 05 (see PLAN.md's Case 05, Finding 4) — useful as a finding,
# but out of scope for this repo's ongoing verification going forward.
#
# This assumes the account behind UPSTAGE_API_KEY is on Upstage's
# **default (Tier 0)** rate limits, not a paid commitment tier — that's
# the whole reason it waits on real headroom instead of firing
# everything at once. Expect a full run to take a while (tens of
# minutes is normal); a higher tier would make the waits mostly
# disappear, but nothing here assumes one.

on:
  workflow_dispatch: {}

jobs:
  verify-sequential:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: astral-sh/setup-uv@v5

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install claude-upstage
        run: curl -fsSL https://console.upstage.ai/claude-upstage.sh | sh -s install

      # Why a fork instead of `npm install -g openwiki`: Solar Open2 has a
      # real, confirmed bug (Upstage-side, not openwiki's or deepagents')
      # where it drops the tool_call function name specifically in
      # *streamed* responses — verified directly via a local logging
      # proxy comparing stream:false vs stream:true. openwiki's public npm
      # release always streams, so it can't reach Solar Open2 correctly.
      # The jyje/openwiki fork below adds an opt-in
      # OPENWIKI_DISABLE_STREAMING env var that works around it; that fix
      # hasn't landed upstream yet. See
      # 05-langchain-openwiki-solar-open2/README.md's Finding 2 for the
      # full writeup.
      - name: Check out patched openwiki fork
        uses: actions/checkout@v4
        with:
          repository: jyje/openwiki
          ref: fix/disable-streaming-for-tool-calling-providers
          path: openwiki-fork

      - name: Build and link patched openwiki
        working-directory: openwiki-fork
        run: |
          npm install -g pnpm
          pnpm install --frozen-lockfile
          pnpm run build
          npm link

      - name: "Case 01 — Solar Open2 x Claude Code"
        id: c01
        continue-on-error: true
        env:
          UPSTAGE_API_KEY: ${{ secrets.UPSTAGE_API_KEY }}
        run: ./scripts/verify-case.sh 01-solar-open2-harness solar-open2

      - name: "Case 02 — Solar Open2 x Hermes Agent"
        id: c02
        continue-on-error: true
        env:
          UPSTAGE_API_KEY: ${{ secrets.UPSTAGE_API_KEY }}
        run: ./scripts/verify-case.sh 02-hermes-agent-solar-open2 solar-open2

      - name: "Case 03 — Solar Open2 x Claude Agent SDK"
        id: c03
        continue-on-error: true
        env:
          UPSTAGE_API_KEY: ${{ secrets.UPSTAGE_API_KEY }}
        run: ./scripts/verify-case.sh 03-claude-agent-sdk-local solar-open2

      - name: "Case 04 — Solar Open2 x LangChain Deepagents"
        id: c04
        continue-on-error: true
        env:
          UPSTAGE_API_KEY: ${{ secrets.UPSTAGE_API_KEY }}
        run: ./scripts/verify-case.sh 04-langchain-upstage-deepagents solar-open2

      - name: "Case 05 — Solar Open2 x LangChain OpenWiki"
        id: c05
        continue-on-error: true
        env:
          UPSTAGE_API_KEY: ${{ secrets.UPSTAGE_API_KEY }}
        run: ./scripts/verify-case.sh 05-langchain-openwiki-solar-open2 solar-open2

      # continue-on-error steps always report conclusion=success at the
      # job level, so this reads each step's real `outcome` (not
      # overridden) to report what actually happened, and fails the job
      # itself if anything did. Also written to GITHUB_STEP_SUMMARY so
      # the recap renders as a table on the run's summary page, not just
      # in this step's log. Grouped into two tables, Review and Extend,
      # matching the Category column in the root README's Cases table —
      # Case 01/02 validate Solar Open2 in an existing official harness
      # path, Case 03-05 wire it into a broader ecosystem beyond that.
      - name: Recap
        if: always()
        run: |
          names=(
            "Case 01 — Solar Open2 x Claude Code"
            "Case 02 — Solar Open2 x Hermes Agent"
            "Case 03 — Solar Open2 x Claude Agent SDK"
            "Case 04 — Solar Open2 x LangChain Deepagents"
            "Case 05 — Solar Open2 x LangChain OpenWiki"
          )
          categories=(
            "Review"
            "Review"
            "Extend"
            "Extend"
            "Extend"
          )
          outcomes=(
            "${{ steps.c01.outcome }}"
            "${{ steps.c02.outcome }}"
            "${{ steps.c03.outcome }}"
            "${{ steps.c04.outcome }}"
            "${{ steps.c05.outcome }}"
          )

          mark() { [ "$1" = success ] && echo "✅" || echo "❌"; }

          recap_category() {
            local label="$1"
            echo "### $label"
            echo
            echo "| Case | solar-open2 |"
            echo "| --- | --- |"
            for i in "${!names[@]}"; do
              [ "${categories[$i]}" = "$label" ] || continue
              outcome="${outcomes[$i]}"
              echo "| ${names[$i]} | $(mark "$outcome") $outcome |"
            done
            echo
          }

          {
            echo "## verify-all-sequential recap"
            echo
            recap_category "Review"
            recap_category "Extend"
          } | tee -a "$GITHUB_STEP_SUMMARY"

          any_failed=false
          for i in "${!names[@]}"; do
            [ "${outcomes[$i]}" = success ] || any_failed=true
          done

          if [ "$any_failed" = true ]; then
            echo "One or more cases failed — see that step's own log above." >&2
            exit 1
          fi
