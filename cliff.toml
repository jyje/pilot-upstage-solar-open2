# git-cliff configuration — Keep a Changelog style, grouped by Conventional Commit type.
[changelog]
header = """
# Changelog

All notable changes to this repo are documented here.
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
{% set group_name = group | split(pat="_") | last -%}
{% if group_name == "Documentation" or group_name == "Miscellaneous" -%}
<details>
<summary>{{ group_name }} ({{ commits | length }})</summary>
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | trim | upper_first }} ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/jyje/pilot-upstage-solar-open2/commit/{{ commit.id }})) — {% if commit.remote.username %}@{{ commit.remote.username }}{% else %}{{ commit.author.name }}{% endif %}\
{% endfor %}

</details>
{% else -%}
### {{ group_name }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | trim | upper_first }} ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/jyje/pilot-upstage-solar-open2/commit/{{ commit.id }})) — {% if commit.remote.username %}@{{ commit.remote.username }}{% else %}{{ commit.author.name }}{% endif %}\
{% endfor %}
{% endif %}
{% endfor %}\n
"""
trim = true

[git]
# Our own commits use the gitmoji format "<emoji> <type>(<domain>): <title>"
# (see .claude/skills/git-commit-helper), but external contributors could open
# PRs with plain Conventional Commits ("feat: ...", no leading emoji). The
# leading "<emoji> " is therefore matched as OPTIONAL — "^(\S+\s+)?<type>" —
# so both styles are grouped.
conventional_commits = false
commit_preprocessors = [
  { pattern = '\n*Co-Authored-By:.*', replace = "" },
]
filter_unconventional = false
split_commits = false
# Group names are prefixed with a sort key (group_by sorts keys
# alphabetically) so the rendered order reflects importance: Features ->
# Bug Fixes -> Security -> Performance -> Refactor -> Documentation -> Build
# -> Tests -> Removed -> Miscellaneous. The template strips the "NN_" prefix.
commit_parsers = [
  { message = "^(\\S+\\s+)?init", group = "00_Initial Release" },
  { message = "^(\\S+\\s+)?feat", group = "01_Features" },
  { message = "^(\\S+\\s+)?(fix|bug)", group = "02_Bug Fixes" },
  { message = "^(\\S+\\s+)?security", group = "03_Security" },
  { message = "^(\\S+\\s+)?perf", group = "04_Performance" },
  { message = "^(\\S+\\s+)?refactor", group = "05_Refactor" },
  { message = "^(\\S+\\s+)?(docs|article|typo)", group = "06_Documentation" },
  { message = "^(\\S+\\s+)?build", group = "07_Build" },
  { message = "^(\\S+\\s+)?test", group = "08_Tests" },
  { message = "^(\\S+\\s+)?remove", group = "09_Removed" },
  { message = "^(\\S+\\s+)?chore\\(release\\)", skip = true },
  { message = "^(\\S+\\s+)?(chore|dep|style|ci)", group = "10_Miscellaneous" },
]
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "oldest"

# GitHub integration: maps each commit to its GitHub author so the changelog can
# show a real @username (commit.remote.username). Needs a GITHUB_TOKEN at
# generation time; without one the template falls back to the git author name.
[remote.github]
owner = "jyje"
repo = "pilot-upstage-solar-open2"
